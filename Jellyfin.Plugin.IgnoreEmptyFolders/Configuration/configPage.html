<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Ignore Empty Folders</title>
</head>
<body>
    <div id="IgnoreEmptyFoldersConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <form id="IgnoreEmptyFoldersConfigForm">
                    <div class="verticalSection">
                        <div class="sectionTitleContainer flex align-items-center">
                            <h2 class="sectionTitle">Ignore Empty Folders</h2>
                        </div>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="Enabled" />
                            <span>Enable plugin</span>
                        </label>
                        <div class="fieldDescription">When enabled, TV shows with no video files will be automatically removed from the library after each scan.</div>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input type="checkbox" is="emby-checkbox" id="LogDeletions" />
                            <span>Log removed shows</span>
                        </label>
                        <div class="fieldDescription">Write a log entry for each show that is removed.</div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var PluginConfig = {
                pluginId: "b3e4f5a6-7890-4abc-def0-123456789abc"
            };

            document.querySelector('#IgnoreEmptyFoldersConfigPage')
                .addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        document.querySelector('#Enabled').checked = config.Enabled;
                        document.querySelector('#LogDeletions').checked = config.LogDeletions;
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('#IgnoreEmptyFoldersConfigForm')
                .addEventListener('submit', function (e) {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(PluginConfig.pluginId).then(function (config) {
                        config.Enabled = document.querySelector('#Enabled').checked;
                        config.LogDeletions = document.querySelector('#LogDeletions').checked;
                        ApiClient.updatePluginConfiguration(PluginConfig.pluginId, config).then(function () {
                            Dashboard.processPluginConfigurationUpdateResult;
                            Dashboard.hideLoadingMsg();
                        });
                    });
                    e.preventDefault();
                    return false;
                });
        </script>
    </div>
</body>
</html>
